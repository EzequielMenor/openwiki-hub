<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenWiki Hub</title>
  <style>
    /* ===========================================================
       THEME TOKENS — dark-first + mint accent
       Modern Minimal posture adapted for developer docs viewer.
       =========================================================== */
    :root,
    [data-theme="dark"] {
      --bg:        #0a0e1a;
      --bg-soft:   #111827;
      --bg-hover:  #1a2332;
      --surface:   #131a2e;
      --fg:        #e5e7eb;
      --fg-dim:    #9ca3af;
      --fg-muted:  #6b7280;
      --accent:    #10b981;
      --accent-soft: rgba(16, 185, 129, 0.10);
      --accent-glow: rgba(16, 185, 129, 0.18);
      --border:    rgba(255, 255, 255, 0.07);
      --border-strong: rgba(255, 255, 255, 0.12);
      --code-bg:   #1e293b;
      --code-border: rgba(255, 255, 255, 0.06);
      --sidebar-bg: #0c1018;
      --sidebar-active: rgba(16, 185, 129, 0.08);
      --scrollbar-thumb: rgba(255, 255, 255, 0.10);
      --scrollbar-track: transparent;
      --table-stripe: rgba(255, 255, 255, 0.025);
      --blockquote-bg: rgba(16, 185, 129, 0.04);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);
      --overlay-bg: rgba(0, 0, 0, 0.6);
      --badge-bg: rgba(255, 255, 255, 0.06);
      --inline-code-bg: rgba(255, 255, 255, 0.06);
      --inline-code-fg: #6ee7b7;
      --empty-icon-fg: #374151;
    }

    [data-theme="light"] {
      --bg:        #fafbfc;
      --bg-soft:   #f3f4f6;
      --bg-hover:  #e5e7eb;
      --surface:   #ffffff;
      --fg:        #111827;
      --fg-dim:    #4b5563;
      --fg-muted:  #6b7280;
      --accent:    #059669;
      --accent-soft: rgba(5, 150, 105, 0.08);
      --accent-glow: rgba(5, 150, 105, 0.14);
      --border:    rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.14);
      --code-bg:   #f3f4f6;
      --code-border: rgba(0, 0, 0, 0.06);
      --sidebar-bg: #f0f2f5;
      --sidebar-active: rgba(5, 150, 105, 0.06);
      --scrollbar-thumb: rgba(0, 0, 0, 0.15);
      --scrollbar-track: transparent;
      --table-stripe: rgba(0, 0, 0, 0.02);
      --blockquote-bg: rgba(5, 150, 105, 0.04);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.10);
      --overlay-bg: rgba(0, 0, 0, 0.35);
      --badge-bg: rgba(0, 0, 0, 0.05);
      --inline-code-bg: rgba(0, 0, 0, 0.06);
      --inline-code-fg: #047857;
      --empty-icon-fg: #d1d5db;
    }

    /* ===========================================================
       BASE RESET & GLOBAL
       =========================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

    /* ===========================================================
       APP SHELL
       =========================================================== */
    .app { display: flex; height: 100%; }
    .app.is-empty { justify-content: center; align-items: center; }

    /* ===========================================================
       SIDEBAR
       =========================================================== */
    .sidebar {
      width: 300px;
      min-width: 300px;
      height: 100%;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 100;
    }

    /* sidebar header */
    .sidebar-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-logo-icon {
      width: 28px; height: 28px;
      display: grid; place-items: center;
    }
    .sidebar-logo-icon svg { width: 22px; height: 22px; color: var(--accent); }
    .sidebar-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--fg);
    }
    .sidebar-stats {
      font-size: 12px;
      color: var(--fg-muted);
      letter-spacing: 0.01em;
      margin-top: 6px;
    }

    /* search */
    .sidebar-search {
      padding: 10px 16px;
      flex-shrink: 0;
    }
    .search-input-wrap {
      position: relative;
    }
    .search-input-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      color: var(--fg-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px 8px 32px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-input::placeholder { color: var(--fg-muted); }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    /* sidebar file list */
    .sidebar-files {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .sidebar-project {
      margin-bottom: 4px;
    }
    .sidebar-project-name {
      padding: 10px 20px 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-muted);
      user-select: none;
    }
    .sidebar-file {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 20px;
      cursor: pointer;
      font-size: 13.5px;
      color: var(--fg-dim);
      border-left: 2px solid transparent;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      user-select: none;
      position: relative;
    }
    .sidebar-file:hover {
      background: var(--bg-hover);
      border-left-color: var(--accent);
      color: var(--fg);
    }
    .sidebar-file.is-active {
      background: var(--sidebar-active);
      border-left-color: var(--accent);
      color: var(--accent);
      font-weight: 500;
    }
    .sidebar-file-icon {
      width: 16px; height: 16px;
      flex-shrink: 0;
      opacity: 0.55;
    }
    .sidebar-file.is-active .sidebar-file-icon { opacity: 1; color: var(--accent); }
    .sidebar-file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* search highlight */
    .sidebar-file mark {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* sidebar footer */
    .sidebar-footer {
      padding: 10px 20px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 11px;
      color: var(--fg-muted);
      letter-spacing: 0.02em;
    }
    .sidebar-footer-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .sidebar-footer-row:last-child { margin-bottom: 0; }
    .sidebar-footer code {
      background: var(--code-bg);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', ui-monospace, Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0;
    }
    .sidebar-footer .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* sidebar theme toggle */
    .btn-icon {
      width: 30px; height: 30px;
      display: grid; place-items: center;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--fg-dim);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-icon:hover { background: var(--bg-hover); color: var(--fg); }
    .btn-icon:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      border-radius: 8px;
    }
    .btn-icon svg { width: 17px; height: 17px; }

    /* theme toggle rotation animation */
    .theme-toggle svg { transition: transform 0.35s ease; }
    .theme-toggle.rotating svg { transform: rotate(180deg); }

    /* ===========================================================
       MAIN CONTENT
       =========================================================== */
    .main {
      flex: 1;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .main-content {
      max-width: 880px;
      margin: 0 auto;
      padding: 48px 56px 96px;
    }

    /* document area headings */
    .doc-body h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      color: var(--fg);
    }
    .doc-body h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.015em;
      line-height: 1.3;
      margin-top: 42px;
      margin-bottom: 12px;
      color: var(--fg);
    }
    .doc-body h3 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 28px;
      margin-bottom: 8px;
      color: var(--fg);
    }
    .doc-body h4 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.005em;
      margin-top: 20px;
      margin-bottom: 8px;
      color: var(--fg-dim);
    }
    .doc-body p {
      margin-bottom: 14px;
      color: var(--fg-dim);
      max-width: 68ch;
    }
    .doc-body ul, .doc-body ol {
      margin-bottom: 14px;
      padding-left: 22px;
      color: var(--fg-dim);
    }
    .doc-body li { margin-bottom: 4px; }
    .doc-body strong { color: var(--fg); font-weight: 600; }

    /* inline code */
    .doc-body code:not(pre code) {
      background: var(--inline-code-bg);
      color: var(--inline-code-fg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', ui-monospace, Menlo, monospace;
      font-size: 0.875em;
      letter-spacing: -0.01em;
    }

    /* code blocks */
    .code-block-wrap {
      position: relative;
      margin: 18px 0;
      border-radius: 10px;
      overflow: hidden;
    }
    .code-block-wrap pre {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 10px;
      padding: 20px 24px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', ui-monospace, Menlo, monospace;
      font-size: 13px;
      line-height: 1.65;
      color: var(--fg);
      margin: 0;
    }
    .code-lang-tag {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 10px;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--fg-muted);
      pointer-events: none;
    }
    .btn-copy {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg-dim);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
      z-index: 2;
    }
    .code-block-wrap:hover .btn-copy { opacity: 1; }
    .btn-copy:hover { background: var(--bg-hover); color: var(--fg); }
    .btn-copy.copied { color: var(--accent); border-color: var(--accent); }
    .btn-copy svg { width: 13px; height: 13px; }
    .btn-copy:focus-visible {
      opacity: 1;
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    /* has-lang-tag shifts copy button right */
    .code-block-wrap .code-lang-tag ~ .btn-copy { right: 72px; }

    /* tables */
    .doc-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 14px;
    }
    .doc-body th {
      text-align: left;
      padding: 9px 14px;
      font-weight: 600;
      color: var(--fg);
      border-bottom: 1px solid var(--border-strong);
      font-size: 13px;
      letter-spacing: 0.02em;
    }
    .doc-body td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--fg-dim);
    }
    .doc-body tr:nth-child(even) td { background: var(--table-stripe); }

    /* blockquotes */
    .doc-body blockquote {
      border-left: 3px solid var(--accent);
      margin: 18px 0;
      padding: 12px 18px;
      background: var(--blockquote-bg);
      border-radius: 0 8px 8px 0;
      color: var(--fg-dim);
    }
    .doc-body blockquote p:last-child { margin-bottom: 0; }

    /* images in doc */
    .doc-body img {
      max-width: 100%;
      border-radius: 8px;
      margin: 12px 0;
    }

    /* divider */
    .doc-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    /* mermaid container */
    .mermaid-wrap {
      margin: 20px 0;
      padding: 20px;
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 10px;
      overflow-x: auto;
      text-align: center;
    }
    .mermaid-wrap .mermaid { display: inline-block; }

    /* ===========================================================
       EMPTY STATE
       =========================================================== */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 24px;
      max-width: 460px;
      margin: 0 auto;
    }
    .app.is-empty .empty-state { display: flex; }
    .app.is-empty .sidebar { display: none; }
    .app.is-empty .main { display: none; }

    .empty-icon {
      width: 88px; height: 88px;
      margin-bottom: 24px;
      color: var(--empty-icon-fg);
    }
    .empty-state h2 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.015em;
      margin-bottom: 8px;
      color: var(--fg);
    }
    .empty-state p {
      font-size: 14px;
      color: var(--fg-dim);
      margin-bottom: 20px;
      max-width: 360px;
    }
    .empty-command {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 8px;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 13px;
      color: var(--inline-code-fg);
      margin-bottom: 20px;
    }
    .empty-command .prompt { color: var(--fg-muted); }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary svg { width: 16px; height: 16px; }
    .btn-primary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ===========================================================
       MOBILE HAMBURGER
       =========================================================== */
    .hamburger {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 200;
      width: 38px; height: 38px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
    }
    .hamburger svg { width: 20px; height: 20px; }
    .hamburger:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 10px;
    }

    /* mobile sidebar overlay */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      z-index: 150;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .sidebar-overlay.open { opacity: 1; }

    /* ===========================================================
       RESPONSIVE
       =========================================================== */
    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        box-shadow: var(--shadow-md);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay { display: block; pointer-events: none; }
      .sidebar-overlay.open { pointer-events: auto; }
      .main-content { padding: 56px 20px 80px; }
      .doc-body h1 { font-size: 26px; }
      .doc-body h2 { font-size: 19px; margin-top: 32px; }
      .code-block-wrap pre { padding: 16px 16px; font-size: 12px; }
    }
    /* ===========================================================
       REDUCED MOTION
       =========================================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .theme-toggle svg { transform: none !important; }
    }
  </style>
</head>
<body>

  <!-- MOBILE HAMBURGER -->
  <button class="hamburger" id="hamburger" aria-label="Open sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="4" y1="6" x2="20" y2="6"/>
      <line x1="4" y1="12" x2="20" y2="12"/>
      <line x1="4" y1="18" x2="20" y2="18"/>
    </svg>
  </button>

  <!-- SIDEBAR OVERLAY (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- APP SHELL -->
  <div class="app" id="app">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar" data-od-id="sidebar">
      <div class="sidebar-header" data-od-id="sidebar-header">
        <div class="sidebar-logo">
          <span class="sidebar-logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
            </svg>
          </span>
          <span class="sidebar-title">OpenWiki Hub</span>
          <span style="flex:1"></span>
          <button class="btn-icon theme-toggle" id="theme-toggle" aria-label="Toggle theme" data-od-id="theme-toggle">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none;">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
            </svg>
          </button>
        </div>
        <div class="sidebar-stats" id="sidebar-stats">3 projects · 8 files</div>
      </div>
      <div class="sidebar-search" data-od-id="sidebar-search">
        <div class="search-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" id="search-input" placeholder="Filter files..." autocomplete="off" />
        </div>
      </div>
      <nav class="sidebar-files" id="sidebar-files" data-od-id="sidebar-file-list">
        <!-- rendered by JS -->
      </nav>
      <div class="sidebar-footer" data-od-id="sidebar-footer">
        <div class="sidebar-footer-row">
          <span class="dot"></span> Last scan: <span id="last-scan">—</span>
        </div>
        <div class="sidebar-footer-row">
          <code>owhu</code> to refresh &nbsp;·&nbsp; <kbd style="font-family:inherit;font-size:10px;background:var(--badge-bg);padding:1px 5px;border-radius:3px;border:1px solid var(--border);">⌘K</kbd> search
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main" id="main-content" data-od-id="main-content">
      <div class="main-content" data-od-id="document-view">
        <div class="doc-body" id="doc-body">
          <!-- rendered markdown goes here -->
        </div>
      </div>
    </main>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="empty-state" data-od-id="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
        </svg>
      </div>
      <h2 data-od-id="empty-heading">No wikis yet</h2>
      <p>OpenWiki Hub muestra documentacion generada por <strong>openwiki</strong>. Ejecuta el comando en tu proyecto para generar la primera wiki.</p>
      <div class="empty-command">
        <span class="prompt">$</span> owhu
      </div>
      <button class="btn-primary" id="btn-demo" data-od-id="btn-load-demo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        Cargar datos de ejemplo
      </button>
    </div>

  </div>

  <!-- marked.js for markdown rendering + mermaid for diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>

  <script>
  (function () {
    /* ===========================================================
       DATA — populated at runtime from /wikis.json (generated by link.sh)
       Each project: { name, label, files: [{ name, label, path, updatedAt }] }
       The actual markdown content of each file is fetched on demand.
       =========================================================== */
    var MOCK = {
      lastScan: '',
      projects: []
    };

    /* ===========================================================
       STATE
       =========================================================== */
    var state = {
      activeFile: null,
      searchQuery: '',
      isEmpty: false,
      sidebarOpen: false
    };

    /* ===========================================================
       DOM REFS
       =========================================================== */
    var $app           = document.getElementById('app');
    var $sidebar       = document.getElementById('sidebar');
    var $sidebarFiles  = document.getElementById('sidebar-files');
    var $sidebarStats  = document.getElementById('sidebar-stats');
    var $searchInput   = document.getElementById('search-input');
    var $docBody       = document.getElementById('doc-body');
    var $emptyState    = document.getElementById('empty-state');
    var $mainContent   = document.getElementById('main-content');
    var $hamburger     = document.getElementById('hamburger');
    var $overlay       = document.getElementById('sidebar-overlay');
    var $themeToggle   = document.getElementById('theme-toggle');
    var $lastScan      = document.getElementById('last-scan');
    var $btnDemo       = document.getElementById('btn-demo');

    /* ===========================================================
       THEME
       =========================================================== */
    var THEME_KEY = 'openwiki-hub:theme';
    function getTheme() {
      try { return localStorage.getItem(THEME_KEY) || 'dark'; } catch (_) { return 'dark'; }
    }
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      try { localStorage.setItem(THEME_KEY, t); } catch (_) {}
      updateThemeIcons(t);
    }
    function updateThemeIcons(t) {
      var sun = $themeToggle.querySelector('.icon-sun');
      var moon = $themeToggle.querySelector('.icon-moon');
      if (t === 'dark') { sun.style.display = ''; moon.style.display = 'none'; }
      else { sun.style.display = 'none'; moon.style.display = ''; }
    }
    function toggleTheme() {
      $themeToggle.classList.add('rotating');
      setTimeout(function () { $themeToggle.classList.remove('rotating'); }, 350);
      setTheme(getTheme() === 'dark' ? 'light' : 'dark');
    }

    /* ===========================================================
       FLATTEN FILES + PROJECT/FILE COUNTS
       =========================================================== */
    function getFlatFiles() {
      var flat = [];
      MOCK.projects.forEach(function (proj) {
        proj.files.forEach(function (f) {
          // path from wikis.json includes "wikis/" prefix (it's the HTTP path)
          flat.push({ project: proj.name, name: f.name, label: f.label, path: f.path });
        });
      });
      return flat;
    }

    function getStats() {
      var fileCount = 0;
      MOCK.projects.forEach(function (p) { fileCount += p.files.length; });
      return { projects: MOCK.projects.length, files: fileCount };
    }

    /* ===========================================================
       RENDER SIDEBAR
       =========================================================== */
    function renderSidebar() {
      var q = (state.searchQuery || '').toLowerCase().trim();
      var html = '';
      MOCK.projects.forEach(function (proj) {
        var fileHtml = '';
        proj.files.forEach(function (f) {
          var match = !q || f.name.toLowerCase().indexOf(q) !== -1 || proj.name.toLowerCase().indexOf(q) !== -1;
          if (!match) return;
          var isActive = state.activeFile && state.activeFile.path === (proj.name + '/' + f.name);
          var cls = 'sidebar-file' + (isActive ? ' is-active' : '');
          var displayName = f.name;
          if (q && q.length > 0) {
            var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            displayName = f.name.replace(re, '<mark>$1</mark>');
          }
          fileHtml += '<div class="' + cls + '" data-path="' + proj.name + '/' + f.name + '" data-od-id="sidebar-file-' + proj.name + '-' + f.name.replace('.md','') + '">' +
            '<svg class="sidebar-file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>' +
            '<span class="sidebar-file-name">' + displayName + '</span>' +
          '</div>';
        });
        if (fileHtml) {
          html += '<div class="sidebar-project">' +
            '<div class="sidebar-project-name">' + proj.name + '</div>' +
            fileHtml +
          '</div>';
        }
      });
      $sidebarFiles.innerHTML = html || '<div style="padding:20px;font-size:13px;color:var(--fg-muted);">No files match your search.</div>';

      var stats = getStats();
      $sidebarStats.textContent = stats.projects + ' project' + (stats.projects !== 1 ? 's' : '') + ' · ' + stats.files + ' file' + (stats.files !== 1 ? 's' : '');
    }

    /* ===========================================================
       RENDER DOCUMENT
       =========================================================== */
    function renderDocument() {
      if (!state.activeFile) {
        $docBody.innerHTML = '<div style="padding:40px;color:var(--fg-muted);text-align:center;font-size:14px;">Select a file from the sidebar to view its documentation.</div>';
        return;
      }

      var md = state.activeFile.content;
      var html;
      if (typeof marked !== 'undefined' && marked.parse) {
        marked.setOptions({ breaks: false, gfm: true });
        html = marked.parse(md);
      } else {
        html = '<pre>' + escapeHtml(md) + '</pre>';
      }

      $docBody.innerHTML = html;

      // render any mermaid diagrams (async; harmless if no mermaid blocks)
      renderMermaidBlocks($docBody);

      // attach copy buttons to code blocks
      $docBody.querySelectorAll('pre').forEach(function (pre) {
        var code = pre.querySelector('code');
        var text = code ? code.textContent : pre.textContent;
        var lang = code && code.className ? code.className.replace('language-', '') : '';

        var wrap = document.createElement('div');
        wrap.className = 'code-block-wrap';
        pre.parentNode.insertBefore(wrap, pre);
        wrap.appendChild(pre);

        if (lang) {
          var tag = document.createElement('span');
          tag.className = 'code-lang-tag';
          tag.textContent = lang;
          wrap.appendChild(tag);
        }

        var btn = document.createElement('button');
        btn.className = 'btn-copy';
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy';
        btn.addEventListener('click', function () {
          navigator.clipboard.writeText(text).then(function () {
            btn.classList.add('copied');
            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
            setTimeout(function () {
              btn.classList.remove('copied');
              btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy';
            }, 1800);
          }).catch(function () {});
        });
        wrap.appendChild(btn);
      });

      // scroll to top
      $mainContent.scrollTop = 0;

      // move focus to first heading in the rendered doc
      var firstHeading = $docBody.querySelector('h1, h2');
      if (firstHeading) {
        firstHeading.setAttribute('tabindex', '-1');
        firstHeading.focus({ preventScroll: true });
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* ===========================================================
       MERMAID RENDERING (called after each markdown render)
       =========================================================== */
    function renderMermaidBlocks(root) {
      if (typeof mermaid === 'undefined') return;
      if (!window._mermaidInit) {
        try {
          var theme = getTheme() === 'light' ? 'default' : 'dark';
          mermaid.initialize({
            startOnLoad: false,
            theme: theme,
            securityLevel: 'loose',
            themeVariables: theme === 'dark' ? {
              background: '#0c1018',
              primaryColor: '#111827',
              primaryTextColor: '#e5e7eb',
              primaryBorderColor: '#10b981',
              lineColor: '#6ee7b7',
              secondaryColor: '#1a2332',
              tertiaryColor: '#1a2332',
            } : undefined,
          });
        } catch (e) { /* ignore */ }
        window._mermaidInit = true;
      }
      var blocks = root.querySelectorAll('pre code.language-mermaid');
      blocks.forEach(function (block, idx) {
        var source = block.textContent;
        var id = 'mermaid-' + Math.random().toString(36).slice(2, 10) + '-' + idx;
        // unwrap the pre>code into a fresh div so mermaid has a clean container
        var parent = block.parentElement;
        if (!parent || parent.parentNode === null) return;
        var placeholder = document.createElement('div');
        placeholder.className = 'mermaid-wrap';
        placeholder.style.minHeight = '40px';
        parent.parentNode.insertBefore(placeholder, parent);
        parent.parentNode.removeChild(parent);

        mermaid.render(id, source)
          .then(function (res) {
            placeholder.innerHTML = res.svg;
          })
          .catch(function (err) {
            placeholder.className = 'mermaid-error';
            placeholder.textContent = 'Mermaid error: ' + (err.message || err);
          });
      });
    }

    /* ===========================================================
       NAVIGATION
       =========================================================== */
    function selectFile(project, filename) {
      // project + filename arrive from the click handler. The HTTP path lives in
      // wikis.json as "wikis/<project>/<filename>", so we build the full path here.
      var flat = getFlatFiles();
      var httpPath = 'wikis/' + project + '/' + filename;
      var meta = null;
      for (var i = 0; i < flat.length; i++) {
        if (flat[i].path === httpPath) { meta = flat[i]; break; }
      }
      if (!meta) return;

      // show the active file immediately with a loading state
      state.activeFile = Object.assign({}, meta, { content: null });
      state.isEmpty = false;
      updateAppView();
      renderSidebar();
      $docBody.innerHTML = '<div style="padding:60px 24px;color:var(--fg-muted);text-align:center;font-size:14px;">Loading ' + escapeHtml(filename) + '…</div>';
      $mainContent.scrollTop = 0;
      closeSidebar();

      // fetch the markdown
      fetch('/' + httpPath)
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.text();
        })
        .then(function (md) {
          state.activeFile.content = md;
          renderDocument();
        })
        .catch(function (err) {
          $docBody.innerHTML = '<div style="padding:40px;color:#fca5a5;background:#3a1f1f;border:1px solid #6b2c2c;border-radius:8px;margin:24px;font-size:13px;font-family:ui-monospace,Menlo,monospace;">Error loading ' + escapeHtml(filename) + ': ' + escapeHtml(err.message) + '</div>';
        });
    }

    function updateAppView() {
      if (state.isEmpty) {
        $app.classList.add('is-empty');
      } else {
        $app.classList.remove('is-empty');
      }
    }

    /* ===========================================================
       MOBILE SIDEBAR
       =========================================================== */
    function openSidebar() {
      state.sidebarOpen = true;
      $sidebar.classList.add('open');
      $overlay.classList.add('open');
      $hamburger.setAttribute('aria-label', 'Close sidebar');
    }
    function closeSidebar() {
      state.sidebarOpen = false;
      $sidebar.classList.remove('open');
      $overlay.classList.remove('open');
      $hamburger.setAttribute('aria-label', 'Open sidebar');
    }
    function toggleSidebar() {
      if (state.sidebarOpen) { closeSidebar(); } else { openSidebar(); }
    }

    /* ===========================================================
       SEARCH
       =========================================================== */
    var searchTimer = null;
    function onSearchInput() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(function () {
        state.searchQuery = $searchInput.value;
        renderSidebar();
      }, 120);
    }
    function clearSearch() {
      $searchInput.value = '';
      state.searchQuery = '';
      renderSidebar();
    }

    /* ===========================================================
       EMPTY STATE → LOAD DEMO DATA
       =========================================================== */
    function loadDemoData() {
      // Fetch the manifest from the local server (link.sh writes it).
      fetch('/wikis.json')
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status + ' — corre owhu primero');
          return res.json();
        })
        .then(function (manifest) {
          MOCK.projects = manifest.wikis || [];
          MOCK.lastScan = manifest.builtAt
            ? new Date(manifest.builtAt).toLocaleString()
            : 'now';
          if (MOCK.projects.length === 0) {
            throw new Error('wikis.json está vacío. Corre owhu para generar symlinks.');
          }
          state.isEmpty = false;
          updateAppView();
          $lastScan.textContent = MOCK.lastScan;
          renderSidebar();
          // auto-select first file
          var first = MOCK.projects[0];
          if (first && first.files.length > 0) {
            selectFile(first.name, first.files[0].name);
          }
        })
        .catch(function (err) {
          // show the error in the empty state area so the user sees what went wrong
          $lastScan.textContent = '—';
          var msg = err && err.message ? err.message : String(err);
          alert('No se pudieron cargar las wikis:\n' + msg + '\n\nAsegúrate de haber ejecutado owhu en la terminal.');
        });
    }

    /* ===========================================================
       INIT
       =========================================================== */
    function init() {
      // theme
      setTheme(getTheme());

      // start in empty state — user sees all 3 views (empty → loaded → document)
      state.isEmpty = true;
      updateAppView();

      // pre-render sidebar for when data loads
      renderSidebar();
    }

    /* ===========================================================
       EVENT BINDINGS
       =========================================================== */
    $themeToggle.addEventListener('click', toggleTheme);

    $hamburger.addEventListener('click', toggleSidebar);
    $overlay.addEventListener('click', closeSidebar);

    $searchInput.addEventListener('input', onSearchInput);

    // sidebar file clicks (delegated)
    $sidebarFiles.addEventListener('click', function (e) {
      var el = e.target.closest('.sidebar-file');
      if (!el) return;
      var path = el.getAttribute('data-path');
      var parts = path.split('/');
      var project = parts[0];
      var filename = parts.slice(1).join('/');
      selectFile(project, filename);
    });

    // demo button on empty state
    $btnDemo.addEventListener('click', loadDemoData);

    // keyboard: Escape closes search + sidebar
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        if (document.activeElement === $searchInput) {
          $searchInput.blur();
          clearSearch();
        }
        if (state.sidebarOpen) {
          closeSidebar();
        }
      }
      // Cmd/Ctrl+K focuses search
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        $searchInput.focus();
        if (window.innerWidth <= 768) { openSidebar(); }
      }
    });

    // close sidebar on window resize to desktop
    var resizeTimer;
    window.addEventListener('resize', function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function () {
        if (window.innerWidth > 768 && state.sidebarOpen) {
          closeSidebar();
        }
      }, 200);
    });

    /* ===========================================================
       BOOT
       =========================================================== */
    init();
  })();
  </script>
</body>
</html>
